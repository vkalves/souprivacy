<head>

        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; position: fixed;
}

* { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

body {
    background: linear-gradient(135deg, #e0f2fe, #fcfcfc);
    display: flex; align-items: center; justify-content: center; padding: 20px;
}

.card {
    background: #ffffff; width: 100%; max-width: 380px;
    padding: 35px 25px; border-radius: 25px; text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    display: flex; flex-direction: column; align-items: center;
}

.avatar {
    width: 120px; height: 120px; border-radius: 50%;
    object-fit: cover; border: 3px solid #0088cc;
    box-shadow: 0 8px 20px rgba(0,136,204,0.3);
    margin-bottom: 15px;
}

.badge {
    background: #0088cc; color: #ffffff; font-weight: 700;
    font-size: 12px; text-transform: uppercase; padding: 5px 14px;
    border-radius: 50px; margin-bottom: 10px;
}

.title { font-size: 22px; font-weight: 800; color: #222; margin-bottom: 6px; }

.subtitle { font-size: 13px; color: #555; font-weight: 500; line-height: 1.4; margin-bottom: 15px; }

.online-status {
    font-size: 12px; color: #28a745; font-weight: 700; margin-bottom: 25px;
    background: #e9fbf0; padding: 5px 12px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 6px; border: 1px solid #c3e6cb;
}

.dot { width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; animation: pulse-green 2s infinite; }

@keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
    70% { box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
    100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
}

@keyframes btn-soft-pulse {
    0%, 100% { box-shadow: 0 5px 15px rgba(0,136,204,0.35); transform: scale(1); }
    50%       { box-shadow: 0 8px 28px rgba(0,136,204,0.65), 0 0 0 6px rgba(0,136,204,0.18); transform: scale(1.04); }
}



.btn {
    width: 100%; font-weight: 700; font-size: 15px; padding: 20px;
    border-radius: 50px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-transform: uppercase; text-decoration: none; color: #ffffff !important;
}

.icon-svg { 
    width: 22px; 
    height: 22px; 
    fill: #ffffff; 
    flex-shrink: 0;
}

.btn-telegram {
    background: linear-gradient(135deg, #0099e6, #0070aa);
    box-shadow: 0 5px 15px rgba(0,136,204,0.3);
    animation: btn-soft-pulse 2s ease-in-out infinite;
    transition: transform 0.2s;
}

.btn-telegram:hover {
    transform: scale(1.02);
}

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.98); display: none; align-items: center; justify-content: center; z-index: 999;
}
.loader-box { text-align: center; width: 80%; }
.loader-text { font-weight: 700; color: #333; font-size: 16px; }
.progress { width: 100%; height: 6px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 15px;}
.progress-bar { height: 100%; width: 0%; transition: width 0.1s; }
</style>
</head>

<body>

<div class="card">
    <img src="imagem.jpg" class="avatar" alt="Jessica Rossi">

    <div class="badge">Jessica Rossi 🦋</div>

    <div class="title">Ficou Curioso?</div>
    <div class="subtitle">Acesso exclusivo ao conteúdo que não posto em nenhum outro lugar 🤭🔞</div>

    <div class="online-status">
        <span class="dot"></span> estou online agora
    </div>

    <a  href="https://t.me/carolalvess1"
        class="btn btn-telegram"
        rel="noopener noreferrer"
        onclick="startLoading(this.href, '#0088cc'); return false;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l-.002.001-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.434z"/></svg>
        Meu grupo grátis
    </a>
</div>

<div class="overlay" id="overlay">
    <div class="loader-box">
        <div class="loader-text" id="loaderText">Liberando acesso...</div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const bar = document.getElementById('progressBar');

function startLoading(targetUrl, barColor) {
    if (navigator.vibrate) navigator.vibrate(40);
    overlay.style.display = 'flex';
    bar.style.backgroundColor = barColor;
    
    let progress = 0;
    const duration = 1500;
    const interval = setInterval(() => {
        progress += (100 / (duration / 100));
        bar.style.width = progress + "%";
        if (progress >= 100) { 
            clearInterval(interval); 
            window.location.href = targetUrl; 
        }
    }, 100);
}
</script>

</body>
