<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Leticia Soares | Exclusivo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "v67gqjmjp7");
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,500;1,600&display=swap');

:root {
    /* Tema azul Telegram */
    --privacy-grad-start: #2AABEE; /* azul Telegram vibrante */
    --privacy-grad-end:   #229ED9; /* azul Telegram mais escuro */
    --privacy-accent:     #2AABEE; /* tom intermediário do degradê, para usos sólidos */
    --privacy-text:       #343434; /* cinza-chumbo do texto */
}

html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; position: fixed;
}

* { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

body {
    background: linear-gradient(135deg, #eaf6fd, #fcfcfc);
    display: flex; align-items: center; justify-content: center; padding: 20px;
}

.card {
    background: #ffffff; width: 100%; max-width: 380px;
    padding: 35px 25px; border-radius: 25px; text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    display: flex; flex-direction: column; align-items: center;
}

.avatar-ring {
    width: 126px; height: 126px; border-radius: 50%;
    background: linear-gradient(135deg, var(--privacy-grad-start), var(--privacy-grad-end));
    box-shadow: 0 8px 20px rgba(42,171,238,0.3);
    padding: 3px;
    margin-bottom: 15px;
}

.avatar {
    width: 100%; height: 100%; border-radius: 50%;
    object-fit: cover; display: block;
    border: 2px solid #ffffff;
}

.badge {
    font-family: 'Montserrat', sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #4a4a4a;
    background: #e8edf1;
    padding: 5px 14px;
    border-radius: 50px;
    margin-bottom: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.badge-name {
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.badge svg { width: 15px; height: 15px; flex-shrink: 0; }

.title { font-size: 22px; font-weight: 800; color: var(--privacy-text); margin-bottom: 6px; }

.subtitle { font-size: 13px; color: #555; font-weight: 500; line-height: 1.4; margin-bottom: 15px; }

.online-status {
    font-size: 12px; color: #28a745; font-weight: 700; margin-bottom: 25px;
    background: #e9fbf0; padding: 5px 12px; border-radius: 20px;
    display: inline-flex; align-items: center; gap: 6px; border: 1px solid #c3e6cb;
}

.dot { width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; animation: pulse-green 2s infinite; }

@keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
    70% { box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
    100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
}

@keyframes btn-soft-pulse {
    0%, 100% { box-shadow: 0 5px 15px rgba(42,171,238,0.35); transform: scale(1); }
    50%       { box-shadow: 0 8px 28px rgba(42,171,238,0.65), 0 0 0 6px rgba(42,171,238,0.18); transform: scale(1.04); }
}



.btn {
    width: 100%; font-weight: 700; font-size: 15px; padding: 20px;
    border-radius: 50px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-transform: uppercase; text-decoration: none; color: #ffffff !important;
}

.icon-svg { 
    width: 22px; 
    height: 22px; 
    fill: #ffffff; 
    flex-shrink: 0;
}

.btn-telegram {
    background: linear-gradient(135deg, var(--privacy-grad-start), var(--privacy-grad-end));
    box-shadow: 0 5px 15px rgba(42,171,238,0.3);
    animation: btn-soft-pulse 2s ease-in-out infinite;
    transition: transform 0.2s;
}

.btn-telegram:hover {
    transform: scale(1.02);
}

.secure-badge {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 14px; font-size: 12px; font-weight: 600; color: #777;
}

.lock-icon { width: 13px; height: 13px; flex-shrink: 0; }

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.98); display: none; align-items: center; justify-content: center; z-index: 999;
}
.loader-box { text-align: center; width: 80%; }
.loader-text { font-weight: 700; color: var(--privacy-text); font-size: 16px; }
.progress { width: 100%; height: 6px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 15px;}
.progress-bar {
    height: 100%; width: 0%; transition: width 0.1s;
    background: linear-gradient(90deg, var(--privacy-grad-start), var(--privacy-grad-end));
}
</style>
</head>

<body>

<div class="card">
    <div class="avatar-ring">
        <img src="imagem.jpg" class="avatar" alt="Leticia Soares">
    </div>

    <div class="badge">
        <span class="badge-name">
            leticia soares
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2l2.4 2.1 3.1-.5 1 3 2.9 1.4-.6 3.1 1.9 2.4-1.9 2.4.6 3.1-2.9 1.4-1 3-3.1-.5L12 22l-2.4-2.1-3.1.5-1-3-2.9-1.4.6-3.1L1.3 10.5l1.9-2.4-.6-3.1 2.9-1.4 1-3 3.1.5L12 2z" fill="#3897F0"/>
                <path d="M8.5 12.2l2.4 2.4 4.6-4.9" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </span>
    </div>

    <div class="title">Ficou Curioso?</div>
    <div class="subtitle">Acesso exclusivo ao conteúdo que não posto em nenhum outro lugar 🤭🔞</div>

    <div class="online-status">
        <span class="dot"></span> estou online agora
    </div>

    <a  href="https://t.me/leticiasoarezbot?start=abc123"
        class="btn btn-telegram"
        rel="noopener noreferrer"
        onclick="startLoading(this.href, 'linear-gradient(90deg, var(--privacy-grad-start), var(--privacy-grad-end))'); return false;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l-.002.001-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.434z"/></svg>
        Meu telegram
    </a>

    <div class="secure-badge">
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="11" width="14" height="10" rx="2" stroke="#777" stroke-width="1.8"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#777" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        site seguro e anônimo
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="loader-box">
        <div class="loader-text" id="loaderText">Liberando acesso...</div>
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const bar = document.getElementById('progressBar');

function startLoading(targetUrl, barColor) {
    if (navigator.vibrate) navigator.vibrate(40);
    overlay.style.display = 'flex';
    bar.style.background = barColor;
    
    let progress = 0;
    const duration = 1500;
    const interval = setInterval(() => {
        progress += (100 / (duration / 100));
        bar.style.width = progress + "%";
        if (progress >= 100) { 
            clearInterval(interval); 
            window.location.href = targetUrl; 
        }
    }, 100);
}
</script>

</body>
</html>
